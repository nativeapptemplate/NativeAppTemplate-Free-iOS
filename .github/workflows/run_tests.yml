name: Run tests
on:
  pull_request:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'
      - uses: actions/checkout@v3
      - name: Install SwiftLint and SwiftFormat
        run: |
          brew install swiftlint swiftformat
      - name: SwiftFormat Lint
        run: |
          swiftformat --lint NativeAppTemplate
