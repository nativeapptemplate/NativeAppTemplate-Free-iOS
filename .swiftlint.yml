# SwiftLint Configuration for NativeAppTemplate

# Disabled rules
disabled_rules:
  - trailing_whitespace
  - todo

# Opt-in rules for better code quality
opt_in_rules:
  - empty_count
  - empty_string
  - explicit_init
  - first_where
  - closure_spacing
  - redundant_nil_coalescing
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces

# Included paths
included:
  - NativeAppTemplate

# Excluded paths
excluded:
  - Pods
  - Carthage
  - DerivedData
  - .build

# Configured rules
line_length:
  warning: 120
  error: 150

function_body_length:
  warning: 100
  error: 300

type_body_length:
  warning: 450
  error: 500

file_length:
  warning: 650
  error: 1000

type_name:
  max_length:
    warning: 50

cyclomatic_complexity:
  warning: 15
  error: 25

large_tuple:
  warning: 3
  error: 4

identifier_name:
  min_length:
    warning: 2
  max_length:
    warning: 50
  excluded:
    - by
    - id
    - db
